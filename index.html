  <style>
    html, body {
      height: 100%;
      margin: 0;
      /* Suporte ao notch do iPhone (safe area) */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    #root {
      height: 100%;
    }
    /* Splash screen enquanto a app carrega */
    #splash {
      position: fixed;
      inset: 0;
      background: #7c3aed;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: splashSlideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    #splash img { width: 96px; height: 96px; border-radius: 22px; }
    #splash p { color: white; font-size: 20px; font-weight: 700; font-family: system-ui, sans-serif; letter-spacing: -0.5px; }
    #splash-footer {
      position: absolute;
      bottom: 32px;
      color: rgba(255, 255, 255, 0.75);
      font-size: 10px;
      font-weight: 600;
      font-family: system-ui, sans-serif;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      text-align: center;
      padding: 0 20px;
    }
    @keyframes splashSlideUp {
      0% {
        transform: translateY(100vh);
        opacity: 0;
      }
      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>

<body translate="no" class="notranslate">
  <!-- Splash screen nativo (substitui tela branca iOS) -->
  <div id="splash">
    <div id="splash-content">
      <img src="/icons/icon-192x192.png" alt="SOS Contábeis" />
      <p>SOS Contábeis</p>
    </div>
    <div id="splash-footer">
      todos os direitos reservados a electro m
    </div>
  </div>

  <div id="root" translate="no" class="notranslate"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // Remove o splash assim que o DOM e os scripts adiados (módulo React) terminarem.
    // Usa DOMContentLoaded em vez de 'load': 'load' só dispara depois de TODOS os
    // recursos da página (incluindo imagens externas, como a do ecrã de login)
    // terminarem — em rede lenta/instável (comum em PWA móvel) isso prendia o
    // splash indefinidamente, mesmo com a app já montada por baixo.
    function esconderSplash() {
      setTimeout(function () {
        var splash = document.getElementById('splash');
        if (splash) {
          splash.classList.add('hidden');
          setTimeout(function () { splash.remove(); }, 500);
        }
      }, 300);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', esconderSplash);
    } else {
      esconderSplash();
    }
  </script>
</body>

</html>
